# Aggregator Service in Microservices

---

## What is an Aggregator Service?

An **Aggregator Service** is a microservice whose **sole job** is to call multiple downstream services, collect their responses, combine/transform them, and return a **single unified response** to the client.

> Think of it as a **coordinator** вҖ” it knows *who* has what data, fetches it all, and stitches it together so the client doesn't have to make 5 separate calls.

---

## The Core Problem It Solves

Without an aggregator, the client (mobile app / frontend) has to:

```
Client  вҶ’  calls  вҶ’  Order Service
Client  вҶ’  calls  вҶ’  Payment Service
Client  вҶ’  calls  вҶ’  User Service
Client  вҶ’  calls  вҶ’  Inventory Service
Client  вҶ’  calls  вҶ’  Shipping Service
```

**Problems:**
- Too many round trips вҶ’ slow UI
- Client becomes tightly coupled to every service
- Business logic leaks into the frontend
- Adding a new service = changing every client

---

## With Aggregator:

```
Client  вҶ’  calls  вҶ’  [ Aggregator Service ]
                            в”Ӯ
              в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
              в–ј             в–ј              в–ј
         Order Svc     Payment Svc    Shipping Svc
              в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ

                            в”Ӯ
                            в–ј
                    Single Response to Client
```

---

## Where / When to Use It

| Situation | Use Aggregator? |
|---|---|
| Dashboard page needing data from 5 services | вң… Yes |
| Mobile app with limited bandwidth / battery | вң… Yes |
| Order summary page (order + payment + shipping) | вң… Yes |
| Third-party API integration with fan-out | вң… Yes |
| Simple CRUD on a single service | вқҢ No |
| Service-to-service internal calls only | вқҢ No |

---

## Types of Aggregators

### 1. Scatter-Gather Aggregator (Parallel)
Fires all calls **simultaneously**, waits for all, merges.

```
Aggregator в”Җв”Җв”¬в”Җв”Җв–¶ Service A в”Җв”Җв”җ
             в”ңв”Җв”Җв–¶ Service B в”Җв”Җв”Өв”Җв”Җв–¶ merge в”Җв”Җв–¶ response
             в””в”Җв”Җв–¶ Service C в”Җв”Җв”ҳ
```
**Use when:** All calls are independent. Best for performance.

---

### 2. Chain Aggregator (Sequential)
Calls services **one by one** вҖ” output of one feeds into the next.

```
Aggregator в”Җв”Җв–¶ Auth Service в”Җв”Җв–¶ Order Service в”Җв”Җв–¶ Pricing Service в”Җв”Җв–¶ response
```
**Use when:** Call B depends on the result of Call A.

---

### 3. Branch Aggregator (Conditional)
Based on a condition, routes to **different service combinations**.

```
                    в”Ңв”Җв”Җв–¶ Premium Services (if VIP user)
Aggregator в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө
                    в””в”Җв”Җв–¶ Basic Services (if regular user)
```
**Use when:** The set of services to call varies by business rules.

---

## Real-World Example вҖ” E-Commerce Order Dashboard

When a user opens their **Order Detail Page**, the UI needs:
- Order info вҶ’ Order Service
- Payment status вҶ’ Payment Service
- Delivery status вҶ’ Shipping Service
- Product details вҶ’ Inventory Service
- User profile вҶ’ User Service

The **Aggregator** calls all 5 (in parallel where possible), builds one `OrderDashboardResponse`, and returns it.

---

## Key Design Decisions Inside an Aggregator

### 1. Parallel vs Sequential
```
// PARALLEL вҖ” use when services are independent
CompletableFuture<Order> orderFuture = orderClient.getOrderAsync(id);
CompletableFuture<Payment> paymentFuture = paymentClient.getPaymentAsync(id);
CompletableFuture.allOf(orderFuture, paymentFuture).join();

// SEQUENTIAL вҖ” use when B depends on A
Order order = orderClient.getOrder(id);
Payment payment = paymentClient.getPayment(order.getPaymentId()); // uses order result
```

---

### 2. Partial Failure Handling
What if Shipping Service is down? You have two choices:

```
Option A вҖ” Fail Fast:
  If any service fails вҶ’ return 500 to client

Option B вҖ” Graceful Degradation:
  If Shipping Service fails вҶ’ return order + payment,
  set shippingStatus = null / "UNAVAILABLE"
  вҶ’ Client still gets a useful response
```
**Graceful degradation is almost always preferred** in aggregators.

---

### 3. Timeout Strategy
Each downstream call must have a timeout. Never let one slow service block the entire aggregator.

```
Order Service     вҶ’ timeout: 2s
Payment Service   вҶ’ timeout: 2s
Shipping Service  вҶ’ timeout: 1s   вҶҗ less critical, tighter timeout
```

---

### 4. Caching
Aggregators are prime candidates for caching вҖ” they do expensive fan-out calls.

```
User profile data    вҶ’ cache for 5 mins  (changes rarely)
Payment status       вҶ’ cache for 30s     (changes sometimes)
Live inventory       вҶ’ no cache           (changes frequently)
```

---

## Aggregator vs API Gateway vs BFF

This is a very common interview confusion point:

| | API Gateway | BFF | Aggregator Service |
|---|---|---|---|
| **Purpose** | Routing, auth, rate limiting | Client-specific API shaping | Data fan-out + merge |
| **Calls downstream services?** | No (just routes) | Yes | Yes |
| **Per-client variant?** | No | Yes (mobile BFF, web BFF) | No |
| **Business logic?** | No | Light | Yes (merge logic) |
| **Example** | Kong, AWS API GW | Mobile-specific endpoint | Order Dashboard Service |

> **BFF (Backend for Frontend)** is a *specialized aggregator* вҖ” an aggregator built specifically for one client type (mobile, web).

## Interview Questions

### Conceptual
1. **What is an Aggregator Service and why do we need it in microservices?**
2. **What is the difference between an API Gateway and an Aggregator Service?**
3. **What is a BFF pattern and how does it relate to an Aggregator?**
4. **When would you choose a Chain Aggregator over a Scatter-Gather?**
5. **How does an Aggregator Service handle partial failures from downstream services?**
6. **What are the performance implications of an Aggregator calling 6 services sequentially?**
7. **How would you add caching to an Aggregator? What are the risks?**
8. **Can an Aggregator itself become a single point of failure? How do you mitigate that?**
9. **What is graceful degradation and how does it apply to Aggregators?**
10. **How do you propagate correlationId / tracing headers through an Aggregator to downstream services?**

---

### Scenario / Situational

1. **"Your order dashboard is slow вҖ” takes 4 seconds to load. You're using an Aggregator that calls 4 services sequentially. What do you do?"**
   - Expected answer: Switch to parallel calls using `CompletableFuture.allOf()`

2. **"The Shipping Service goes down. Your Aggregator starts throwing 500s to all clients. How do you fix this?"**
   - Expected answer: Graceful degradation вҖ” catch the exception, set `shippingInfo = null`, return partial response with a flag

3. **"You need to build a dashboard for mobile and another for web вҖ” both need similar but different data shapes. How do you design this?"**
   - Expected answer: BFF pattern вҖ” two separate aggregators, one per client

4. **"Your Aggregator is calling User Service on every request but user data barely changes. What optimization would you apply?"**
   - Expected answer: Cache user profile with a TTL (e.g., Redis or local Caffeine cache)

5. **"Service B can only be called after you have the result from Service A. But Services C and D are independent. How do you structure the calls in your Aggregator?"**
   - Expected answer: Call A first (sequential), then fan out B (using A's result), C, and D in parallel

6. **"Your Aggregator is calling 5 services. One of them (Recommendation Service) is non-critical. How do you make sure it doesn't block the response?"**
   - Expected answer: Set a tight timeout on it, use `CompletableFuture` with a fallback, return empty recommendations if it times out
