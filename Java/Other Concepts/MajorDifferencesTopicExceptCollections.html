<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Notes</title>

    <link rel="stylesheet" href="style.css">

    <!-- ✅ Code Highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- ✅ Diagram Support -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
</head>

<body>

<h1>My Notes</h1>
<div id="toc"></div>
<!-- <div class="content" id="content"> -->
<div id="content"></div>
<script id="markdown" type="text/plain">


    
</script>

<br>
<a href="../../index.html">⬅ Back</a>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked-gfm-heading-id/lib/index.umd.js"></script>

<script>
mermaid.initialize({ startOnLoad: true });

// 1. Get markdown SAFELY
const rawMarkdown = document.getElementById("markdown").textContent;

const contentDiv = document.getElementById("content");

// 2. Convert markdown → HTML
contentDiv.innerHTML = marked.parse(rawMarkdown);

// 3. Highlight code
Prism.highlightAll();

// 4. Mermaid render
mermaid.initialize({ startOnLoad: true });

// 5. TOC generation
const toc = document.getElementById("toc");
const headings = document.querySelectorAll("#content h1, #content h2, #content h3");

let tocHTML = `<h2>Contents</h2><ul>`;

headings.forEach(h => {
    const id = h.innerText.replace(/\s+/g, "-").toLowerCase();
    h.id = id;
    tocHTML += `<li><a href="#${id}">${h.innerText}</a></li>`;
});

tocHTML += `</ul>`;
toc.innerHTML = tocHTML;

</script>

</body>
</html>
