# Functional Interfaces & Marker Interfaces in Java

---

## Part 1: Marker Interfaces

### What is a Marker Interface?

A marker interface is an **empty interface** — no methods, no fields. It just **marks/tags** a class to signal something to the JVM or framework.

```java
// This is a marker interface — completely empty
public interface Serializable {
    // nothing here
}
```

The class "marked" by it gets special treatment by the JVM or framework at runtime.

---

### How It Works Internally

```
Class implements MarkerInterface
            │
            ▼
JVM / Framework does:
   if (obj instanceof Serializable) {
       // treat this object specially
       // allow serialization
   }
```

The marker is just a **type check signal** — no contract to implement, just an identity tag.

---

### Built-in Marker Interfaces

#### 1. `java.io.Serializable`

Tells the JVM: "this object can be converted to a byte stream (serialized) and reconstructed (deserialized)."

```java
public class User implements Serializable {

    private static final long serialVersionUID = 1L;  // version control for deserialization

    private Long id;
    private String name;
    private String email;

    // If a field should NOT be serialized:
    private transient String password;   // transient = skip during serialization
}

// Serialization
User user = new User(1L, "Manoj", "manoj@example.com");

try (ObjectOutputStream oos = new ObjectOutputStream(
        new FileOutputStream("user.ser"))) {
    oos.writeObject(user);   // works because User implements Serializable
}

// Deserialization
try (ObjectInputStream ois = new ObjectInputStream(
        new FileInputStream("user.ser"))) {
    User restored = (User) ois.readObject();
}
```

Without `Serializable`, `ObjectOutputStream.writeObject()` throws `NotSerializableException`.

---

#### 2. `java.lang.Cloneable`

Tells the JVM: "this object can be cloned via `Object.clone()`."

```java
public class Product implements Cloneable {

    private Long id;
    private String name;
    private double price;

    @Override
    public Product clone() {
        try {
            return (Product) super.clone();   // shallow copy
        } catch (CloneNotSupportedException e) {
            throw new RuntimeException("Clone failed", e);
        }
    }
}

// Usage
Product original = new Product(1L, "Laptop", 999.99);
Product copy     = original.clone();   // works because Cloneable is implemented
```

Without `Cloneable`, `super.clone()` throws `CloneNotSupportedException`.

> **Note:** `Cloneable` is considered a poorly designed interface in Java. Prefer copy constructors or factory methods over `clone()` in real code.

---

#### 3. `java.util.RandomAccess`

Marks a `List` implementation as supporting **O(1) random access** (get by index in constant time). Used by algorithms to choose optimal traversal strategy.

```java
// ArrayList implements RandomAccess — O(1) index access
List<String> arrayList = new ArrayList<>(List.of("a", "b", "c"));

// LinkedList does NOT implement RandomAccess — O(n) index access
List<String> linkedList = new LinkedList<>(List.of("a", "b", "c"));

// Collections.binarySearch uses this internally:
public static int binarySearch(List list, Object key) {
    if (list instanceof RandomAccess) {
        return indexedBinarySearch(list, key);  // fast path
    } else {
        return iteratorBinarySearch(list, key); // iterator path
    }
}
```

---

#### 4. `java.rmi.Remote`

Marks an object as available for **Remote Method Invocation** — callable from a different JVM across a network. Used in distributed Java systems (pre-microservices era).

```java
public interface PaymentService extends Remote {
    String processPayment(double amount) throws RemoteException;
}
```

### Create Your Own Marker Interface

```java
// Custom marker — marks an entity as auditable
public interface Auditable {
    // empty — just a marker
}

// Custom marker — marks a class as thread-safe
public interface ThreadSafe {
    // empty
}

// Usage
public class UserService implements ThreadSafe {
    // signals to other developers: this class is thread-safe
}

public class OrderEntity implements Auditable {
    private Long id;
    private String status;
}

// Framework/utility reads the marker
public class AuditInterceptor {

    public void intercept(Object target) {
        if (target instanceof Auditable) {
            // log audit trail
            System.out.println("Auditing: " + target.getClass().getSimpleName());
        }
    }
}
```

> **Modern alternative:** Annotations (`@Auditable`, `@ThreadSafe`) have largely replaced marker interfaces because they can carry metadata too. But marker interfaces still appear in legacy code and interviews.

## Part 2: Functional Interfaces

### What is a Functional Interface?

A functional interface has **exactly one abstract method**. That's the contract. It can have default and static methods, but only one abstract method.

```java
@FunctionalInterface
public interface Greeting {
    String greet(String name);   // exactly one abstract method
    
    // default methods are fine
    default String greetLoudly(String name) {
        return greet(name).toUpperCase();
    }
}
```

`@FunctionalInterface` is optional but recommended — compiler enforces the single-abstract-method rule.

The power: functional interfaces can be implemented using **lambda expressions** instead of anonymous classes.

```java
// Old way — anonymous class
Greeting g1 = new Greeting() {
    @Override
    public String greet(String name) {
        return "Hello, " + name;
    }
};

// New way — lambda (same thing, much cleaner)
Greeting g2 = name -> "Hello, " + name;

// Method reference
Greeting g3 = MyUtils::buildGreeting;
```

## Built-in Functional Interfaces (`java.util.function`)

Java 8 ships with a full toolkit. They fall into 4 families:

---

### Family 1: `Function<T, R>` — Transform

Takes one input, returns one output.

```
T ──► Function ──► R
```

```java
// Interface definition
@FunctionalInterface
public interface Function<T, R> {
    R apply(T t);
}

// Usage
Function<String, Integer> strLength = str -> str.length();
System.out.println(strLength.apply("Manoj"));  // 5

Function<Integer, String> intToStr = num -> "Number: " + num;
System.out.println(intToStr.apply(42));         // "Number: 42"

// Composing functions
Function<String, String> trim       = String::trim;
Function<String, String> toUpper    = String::toUpperCase;
Function<String, String> trimThenUp = trim.andThen(toUpper);

System.out.println(trimThenUp.apply("  hello  "));  // "HELLO"
```

**Variants:**

```java
// BiFunction<T, U, R> — two inputs, one output
BiFunction<String, Integer, String> repeat = (str, n) -> str.repeat(n);
System.out.println(repeat.apply("ab", 3));  // "ababab"

// UnaryOperator<T> — Function where input and output are same type
UnaryOperator<String> shout = str -> str + "!!!";
System.out.println(shout.apply("hey"));    // "hey!!!"

// BinaryOperator<T> — BiFunction where both inputs and output are same type
BinaryOperator<Integer> add = (a, b) -> a + b;
System.out.println(add.apply(3, 4));       // 7
```

---

### Family 2: `Predicate<T>` — Test / Filter

Takes one input, returns `boolean`.

```
T ──► Predicate ──► boolean
```

```java
@FunctionalInterface
public interface Predicate<T> {
    boolean test(T t);
}

// Usage
Predicate<String> isEmpty    = String::isEmpty;
Predicate<Integer> isEven    = n -> n % 2 == 0;
Predicate<Integer> isPositive = n -> n > 0;

System.out.println(isEven.test(4));     // true
System.out.println(isEven.test(5));     // false

// Composing predicates
Predicate<Integer> isEvenAndPositive = isEven.and(isPositive);
Predicate<Integer> isEvenOrPositive  = isEven.or(isPositive);
Predicate<Integer> isOdd             = isEven.negate();

System.out.println(isEvenAndPositive.test(4));   // true
System.out.println(isEvenAndPositive.test(-4));  // false
System.out.println(isOdd.test(3));               // true

// In Streams
List<Integer> numbers = List.of(1, 2, 3, 4, 5, 6);
List<Integer> evens   = numbers.stream()
                               .filter(isEven)        // Predicate used here
                               .collect(Collectors.toList());
// [2, 4, 6]
```

**Variant:**

```java
// BiPredicate<T, U> — two inputs
BiPredicate<String, Integer> longerThan = (str, len) -> str.length() > len;
System.out.println(longerThan.test("hello", 3));  // true
```

---

### Family 3: `Consumer<T>` — Act / Side-effect

Takes one input, returns nothing. Used for side effects (print, save, send).

```
T ──► Consumer ──► void
```

```java
@FunctionalInterface
public interface Consumer<T> {
    void accept(T t);
}

// Usage
Consumer<String> print  = System.out::println;
Consumer<String> log    = msg -> System.out.println("[LOG] " + msg);

print.accept("Hello");   // Hello
log.accept("Started");   // [LOG] Started

// Chaining consumers
Consumer<String> printAndLog = print.andThen(log);
printAndLog.accept("Event");
// Hello
// [LOG] Event

// In Streams
List<String> names = List.of("Alice", "Bob", "Charlie");
names.forEach(print);        // Consumer used in forEach
```

**Variant:**

```java
// BiConsumer<T, U>
BiConsumer<String, Integer> printWithIndex =
    (name, index) -> System.out.println(index + ": " + name);

List<String> names = List.of("Alice", "Bob");
IntStream.range(0, names.size())
         .forEach(i -> printWithIndex.accept(names.get(i), i));
// 0: Alice
// 1: Bob
```

---

### Family 4: `Supplier<T>` — Provide / Create

Takes nothing, returns a value. Lazy evaluation.

```
Supplier ──► T
```

```java
@FunctionalInterface
public interface Supplier<T> {
    T get();
}

// Usage
Supplier<String>   greeting  = () -> "Hello World";
Supplier<List<String>> newList = ArrayList::new;
Supplier<LocalDateTime> now   = LocalDateTime::now;

System.out.println(greeting.get());  // Hello World

// Lazy loading pattern
public UserResponse getUser(Long id, Supplier<UserResponse> fallback) {
    return userRepository.findById(id)
                         .map(this::toResponse)
                         .orElseGet(fallback);  // Supplier — only called if empty
}

// Called only when needed
getUser(99L, () -> new UserResponse("default", "default@example.com"));
```

## All 4 Families — Quick Reference

```
┌──────────────────┬─────────────┬──────────────┬────────────────────────┐
│ Interface        │ Input       │ Output       │ Method                 │
├──────────────────┼─────────────┼──────────────┼────────────────────────┤
│ Function<T,R>    │ T           │ R            │ apply(T t)             │
│ BiFunction<T,U,R>│ T, U        │ R            │ apply(T t, U u)        │
│ UnaryOperator<T> │ T           │ T            │ apply(T t)             │
│ BinaryOperator<T>│ T, T        │ T            │ apply(T t1, T t2)      │
├──────────────────┼─────────────┼──────────────┼────────────────────────┤
│ Predicate<T>     │ T           │ boolean      │ test(T t)              │
│ BiPredicate<T,U> │ T, U        │ boolean      │ test(T t, U u)         │
├──────────────────┼─────────────┼──────────────┼────────────────────────┤
│ Consumer<T>      │ T           │ void         │ accept(T t)            │
│ BiConsumer<T,U>  │ T, U        │ void         │ accept(T t, U u)       │
├──────────────────┼─────────────┼──────────────┼────────────────────────┤
│ Supplier<T>      │ nothing     │ T            │ get()                  │
└──────────────────┴─────────────┴──────────────┴────────────────────────┘
```

## Create Your Own Functional Interface

```java
// Custom — takes two inputs, returns boolean (like BiPredicate but named better)
@FunctionalInterface
public interface Validator<T> {
    boolean validate(T value);

    // default methods allowed
    default Validator<T> and(Validator<T> other) {
        return value -> this.validate(value) && other.validate(value);
    }

    default Validator<T> or(Validator<T> other) {
        return value -> this.validate(value) || other.validate(value);
    }

    default Validator<T> negate() {
        return value -> !this.validate(value);
    }
}

// Usage
Validator<String> notEmpty   = str -> !str.isEmpty();
Validator<String> minLength  = str -> str.length() >= 3;
Validator<String> noSpaces   = str -> !str.contains(" ");

Validator<String> usernameValidator = notEmpty
                                        .and(minLength)
                                        .and(noSpaces);

System.out.println(usernameValidator.validate("mn"));      // false (too short)
System.out.println(usernameValidator.validate("manoj"));   // true
System.out.println(usernameValidator.validate("ma noj"));  // false (has space)
```

---

```java
// Custom — trifunction (Java doesn't have one built-in)
@FunctionalInterface
public interface TriFunction<A, B, C, R> {
    R apply(A a, B b, C c);
}

// Usage
TriFunction<String, String, Integer, String> buildUrl =
    (protocol, host, port) -> protocol + "://" + host + ":" + port;

System.out.println(buildUrl.apply("https", "api.myapp.com", 8080));
// https://api.myapp.com:8080
```

## Where They Are Used in Spring Boot & Streams

```java
// Real-world service using all four families together
@Service
public class UserService {

    private final UserRepository userRepository;

    // Predicate — filter active users
    private final Predicate<User> isActive = user -> user.getStatus() == Status.ACTIVE;

    // Function — transform entity to DTO
    private final Function<User, UserResponse> toResponse =
        user -> new UserResponse(user.getId(), user.getName(), user.getEmail());

    // Consumer — audit log side-effect
    private final Consumer<User> auditLog =
        user -> log.info("Accessed user: {}", user.getId());

    // Supplier — default response when not found
    private final Supplier<UserResponse> defaultUser =
        () -> new UserResponse(0L, "Unknown", "N/A");


    public List<UserResponse> getActiveUsers() {
        return userRepository.findAll()
                .stream()
                .filter(isActive)         // Predicate
                .peek(auditLog::accept)   // Consumer (side effect mid-stream)
                .map(toResponse)          // Function
                .collect(Collectors.toList());
    }

    public UserResponse getUserOrDefault(Long id) {
        return userRepository.findById(id)
                .map(toResponse)          // Function
                .orElseGet(defaultUser);  // Supplier
    }
}
```

## Marker vs Functional — Key Differences

```
┌─────────────────────┬──────────────────────────┬──────────────────────────┐
│                     │ Marker Interface          │ Functional Interface      │
├─────────────────────┼──────────────────────────┼──────────────────────────┤
│ Methods             │ Zero                      │ Exactly one abstract     │
│ Purpose             │ Tag/signal a class        │ Enable lambda expressions│
│ Used by             │ JVM / framework via       │ Developer via lambda /   │
│                     │ instanceof check          │ method reference         │
│ Examples            │ Serializable, Cloneable   │ Function, Predicate,     │
│                     │ RandomAccess, Remote      │ Consumer, Supplier       │
│ Custom?             │ Yes — empty interface     │ Yes — @FunctionalInterface│
│ Modern replacement  │ Annotations               │ Still current (Java 8+)  │
└─────────────────────┴──────────────────────────┴──────────────────────────┘
```

---

## Key Interview Points

- A functional interface has **exactly one abstract method** — default and static methods don't count toward that limit.
- `@FunctionalInterface` annotation is **optional** but acts as a compile-time guard.
- Lambdas are essentially **inline implementations** of functional interfaces — the compiler infers which interface you're implementing from context.
- `Runnable` and `Callable` are also functional interfaces — `Runnable` has `run()`, `Callable<V>` has `call()`.
- Marker interfaces work via **`instanceof` checks** at runtime — no method dispatch involved.
- `Serializable` without `serialVersionUID` lets Java auto-generate one — risky because it can change across compilations and break deserialization.
- `Comparator<T>` is technically a functional interface too — its `compare()` is the single abstract method, despite having many default methods.
