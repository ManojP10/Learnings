# Spring Boot Actuator — Complete Guide

---

## What is Actuator?

Spring Boot Actuator gives you **production-ready monitoring endpoints** out of the box — no code needed. It exposes your application's internals over HTTP (or JMX).

```
Your App  +  Actuator  =  Live visibility into health, metrics, config, threads, beans...
```

```
Without Actuator               With Actuator
──────────────────             ─────────────────────────────────
"Is the app healthy?"    →     GET /actuator/health  → {"status":"UP"}
"What's memory usage?"   →     GET /actuator/metrics/jvm.memory.used
"What beans are loaded?" →     GET /actuator/beans
"What's the log level?"  →     GET /actuator/loggers
"Active DB connections?" →     GET /actuator/metrics/hikaricp.connections
```

---

## Dependency

```xml
<dependency>
    <groupId>org.springframework.boot</groupId>
    <artifactId>spring-boot-starter-actuator</artifactId>
</dependency>
```

That's it. No other config needed to get started.

---

## All Default Actuator Endpoints

### Full Table

| Endpoint | URL | What it shows |
|---|---|---|
| `health` | `/actuator/health` | App health status — UP/DOWN |
| `info` | `/actuator/info` | App metadata (name, version) |
| `metrics` | `/actuator/metrics` | List of all metric names |
| `metrics/{name}` | `/actuator/metrics/jvm.memory.used` | Specific metric value |
| `beans` | `/actuator/beans` | All Spring beans loaded |
| `env` | `/actuator/env` | All environment properties |
| `loggers` | `/actuator/loggers` | Logger levels |
| `loggers/{name}` | `/actuator/loggers/com.myapp` | Specific logger level |
| `mappings` | `/actuator/mappings` | All `@RequestMapping` routes |
| `conditions` | `/actuator/conditions` | Auto-config conditions (why bean loaded/not) |
| `configprops` | `/actuator/configprops` | All `@ConfigurationProperties` |
| `threaddump` | `/actuator/threaddump` | JVM thread dump |
| `heapdump` | `/actuator/heapdump` | JVM heap dump (binary file) |
| `scheduledtasks` | `/actuator/scheduledtasks` | All `@Scheduled` tasks |
| `shutdown` | `/actuator/shutdown` | Gracefully shut down app (disabled by default) |
| `httptrace` | `/actuator/httptrace` | Last 100 HTTP requests |
| `caches` | `/actuator/caches` | All caches |
| `flyway` | `/actuator/flyway` | Flyway migration history |
| `liquibase` | `/actuator/liquibase` | Liquibase migration history |

---

### By Default — What's Exposed vs Hidden

```
Enabled (but NOT exposed over HTTP by default):
  beans, conditions, configprops, env, loggers,
  heapdump, mappings, threaddump, scheduledtasks

Enabled AND exposed over HTTP by default:
  health, info

Disabled by default (must explicitly enable):
  shutdown
```

---

## Configuration — `application.yml`

```yaml
management:
  # Expose ALL endpoints over HTTP
  endpoints:
    web:
      exposure:
        include: "*"          # expose everything
        # include: health,info,metrics,loggers   ← or cherry-pick
        # exclude: heapdump,shutdown             ← hide sensitive ones

  # Change base path (default is /actuator)
  endpoints:
    web:
      base-path: /manage      # now: /manage/health

  # Health endpoint — show full details
  endpoint:
    health:
      show-details: always    # always | never | when-authorized
      show-components: always

  # Enable shutdown endpoint (disabled by default)
  endpoint:
    shutdown:
      enabled: true

  # Expose over different port (common in prod — hide from public)
  server:
    port: 8081                # actuator on 8081, app on 8080
```

### 3. `/actuator/loggers` — Change Log Level at Runtime

```bash
# GET — check current level
GET /actuator/loggers/com.myapp.service

# Response
{
  "configuredLevel": "INFO",
  "effectiveLevel": "INFO"
}

# POST — change level at runtime (NO restart needed)
POST /actuator/loggers/com.myapp.service
Content-Type: application/json
{ "configuredLevel": "DEBUG" }

# Now all DEBUG logs in com.myapp.service will appear live
```

This is **extremely powerful** in production — enable DEBUG for 2 minutes to diagnose, then set back to INFO.

## Custom Actuator — 3 Types

```
Type 1 → Custom Health Indicator     ← extend HealthIndicator
Type 2 → Custom Metrics              ← use MeterRegistry
Type 3 → Custom Endpoint             ← use @Endpoint
```

---

## Custom Type 1 — `HealthIndicator`

Add your own component to the `/actuator/health` response.

### Scenario — Check if external Payment Gateway is reachable

```java
// health/PaymentGatewayHealthIndicator.java
import org.springframework.boot.actuate.health.Health;
import org.springframework.boot.actuate.health.HealthIndicator;
import org.springframework.stereotype.Component;

@Component("paymentGateway")       // "paymentGateway" is the key in health response
public class PaymentGatewayHealthIndicator implements HealthIndicator {

    private final PaymentGatewayClient gatewayClient;

    public PaymentGatewayHealthIndicator(PaymentGatewayClient gatewayClient) {
        this.gatewayClient = gatewayClient;
    }

    @Override
    public Health health() {
        try {
            boolean reachable = gatewayClient.ping();   // call external system

            if (reachable) {
                return Health.up()
                        .withDetail("gateway", "Razorpay")
                        .withDetail("status", "Reachable")
                        .withDetail("responseTime", "45ms")
                        .build();
            } else {
                return Health.down()
                        .withDetail("gateway", "Razorpay")
                        .withDetail("reason", "Ping failed")
                        .build();
            }

        } catch (Exception ex) {
            return Health.down()
                    .withDetail("gateway", "Razorpay")
                    .withDetail("error", ex.getMessage())
                    .build();
        }
    }
}
```

### Another Example — Check Kafka connectivity

```java
@Component("kafka")
public class KafkaHealthIndicator implements HealthIndicator {

    private final KafkaTemplate<String, String> kafkaTemplate;

    @Override
    public Health health() {
        try {
            // Try fetching Kafka metadata
            kafkaTemplate.getProducerFactory()
                         .createProducer()
                         .partitionsFor("order-events");

            return Health.up()
                    .withDetail("broker", "localhost:9092")
                    .withDetail("topic", "order-events")
                    .build();

        } catch (Exception ex) {
            return Health.down()
                    .withDetail("broker", "localhost:9092")
                    .withDetail("error", ex.getMessage())
                    .build();
        }
    }
}
```

## Custom Type 2 — Custom Metrics with `MeterRegistry`

Add your own business metrics to `/actuator/metrics`.

```java
// service/OrderService.java
import io.micrometer.core.instrument.Counter;
import io.micrometer.core.instrument.Gauge;
import io.micrometer.core.instrument.MeterRegistry;
import io.micrometer.core.instrument.Timer;

@Service
@Slf4j
public class OrderService {

    // Metric instruments
    private final Counter ordersPlacedCounter;
    private final Counter ordersCancelledCounter;
    private final Timer orderProcessingTimer;
    private final AtomicInteger activeOrders;

    public OrderService(MeterRegistry registry) {

        // Counter — counts occurrences (only goes UP)
        this.ordersPlacedCounter = Counter.builder("orders.placed")
                .description("Total number of orders placed")
                .tag("service", "order-service")   // tags for filtering
                .register(registry);

        this.ordersCancelledCounter = Counter.builder("orders.cancelled")
                .description("Total number of orders cancelled")
                .register(registry);

        // Timer — measures duration + counts calls
        this.orderProcessingTimer = Timer.builder("orders.processing.time")
                .description("Time taken to process an order")
                .register(registry);

        // Gauge — tracks a value that goes UP and DOWN
        this.activeOrders = new AtomicInteger(0);
        Gauge.builder("orders.active", activeOrders, AtomicInteger::get)
                .description("Currently active orders")
                .register(registry);
    }

    public Order createOrder(OrderRequest request) {

        activeOrders.incrementAndGet();   // gauge goes up

        // Timer — wraps the logic and measures it
        return orderProcessingTimer.record(() -> {
            try {
                log.info("Creating order for {}", request.getOrderId());

                Order order = processOrder(request);

                ordersPlacedCounter.increment();   // counter goes up
                return order;

            } finally {
                activeOrders.decrementAndGet();    // gauge goes down
            }
        });
    }

    public void cancelOrder(String orderId) {
        ordersCancelledCounter.increment();
        // cancel logic...
    }
}
```

## Custom Type 3 — `@Endpoint` (Fully Custom Endpoint)

Create a completely new actuator endpoint at `/actuator/your-name`.

### Scenario — `/actuator/order-stats` shows business stats

```java
// endpoint/OrderStatsEndpoint.java
import org.springframework.boot.actuate.endpoint.annotation.*;
import org.springframework.stereotype.Component;

@Component
@Endpoint(id = "order-stats")      // → /actuator/order-stats
public class OrderStatsEndpoint {

    private final OrderRepository orderRepository;

    public OrderStatsEndpoint(OrderRepository orderRepository) {
        this.orderRepository = orderRepository;
    }

    // @ReadOperation → HTTP GET
    @ReadOperation
    public Map<String, Object> getOrderStats() {

        Map<String, Object> stats = new LinkedHashMap<>();

        stats.put("totalOrders",     orderRepository.count());
        stats.put("placedOrders",    orderRepository.countByStatus("PLACED"));
        stats.put("deliveredOrders", orderRepository.countByStatus("DELIVERED"));
        stats.put("cancelledOrders", orderRepository.countByStatus("CANCELLED"));
        stats.put("totalRevenue",    orderRepository.sumRevenue());
        stats.put("timestamp",       LocalDateTime.now());

        return stats;
    }

    // @ReadOperation with parameter → GET /actuator/order-stats/{status}
    @ReadOperation
    public Map<String, Object> getOrderStatsByStatus(@Selector String status) {
        Map<String, Object> stats = new LinkedHashMap<>();
        stats.put("status", status);
        stats.put("count", orderRepository.countByStatus(status.toUpperCase()));
        return stats;
    }

    // @WriteOperation → HTTP POST
    // Used to trigger an action
    @WriteOperation
    public Map<String, String> resetStats() {
        // e.g., reset daily counters
        orderRepository.resetDailyCounters();
        return Map.of(
            "result", "Stats reset successfully",
            "timestamp", LocalDateTime.now().toString()
        );
    }

    // @DeleteOperation → HTTP DELETE
    @DeleteOperation
    public Map<String, String> clearCache(@Selector String cacheKey) {
        cacheManager.getCache(cacheKey).clear();
        return Map.of("result", "Cache cleared: " + cacheKey);
    }
}
```

## Securing Actuator Endpoints

Never expose all endpoints publicly in production.

```java
// config/ActuatorSecurityConfig.java
@Configuration
@EnableWebSecurity
public class ActuatorSecurityConfig {

    @Bean
    public SecurityFilterChain securityFilterChain(HttpSecurity http) throws Exception {

        http.authorizeHttpRequests(auth -> auth

            // Public — health & info only
            .requestMatchers("/actuator/health").permitAll()
            .requestMatchers("/actuator/info").permitAll()

            // Internal ops — need ADMIN role
            .requestMatchers("/actuator/**").hasRole("ADMIN")

            // App endpoints — authenticated users
            .anyRequest().authenticated()
        );

        return http.build();
    }
}
```

```yaml
# application.yml — prod setup
management:
  server:
    port: 8081              # actuator on separate port
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,order-stats
        exclude: heapdump,shutdown,env,beans
  endpoint:
    health:
      show-details: when-authorized   # only show details if ADMIN
```

## Quick Reference Cheat Sheet

```
Default endpoints (HTTP exposed)   → health, info
Enable all                         → include: "*"
Custom health check                → implement HealthIndicator
Custom metric (counter)            → Counter.builder("name").register(registry)
Custom metric (timer)              → Timer.builder("name").register(registry)
Custom metric (gauge)              → Gauge.builder("name", obj, fn).register(registry)
Custom endpoint (GET)              → @Endpoint(id="name") + @ReadOperation
Custom endpoint (POST)             → @WriteOperation
Custom endpoint (DELETE)           → @DeleteOperation
Change log level at runtime        → POST /actuator/loggers/{package}
Secure actuator                    → separate port 8081 + ADMIN role
```
